<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Fingerprint · Intelligence Dashboard</title>
  <style>
    body { background: #0b1120; color: #e2e8f0; font-family: 'Courier New', monospace; padding: 20px; }
    h1 { color: #f97316; border-bottom: 2px solid #1e293b; padding-bottom: 12px; }
    .card { background: #1a2333; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #f97316; }
    .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .value { font-size: 18px; margin: 5px 0 15px; word-break: break-all; }
    .badge { background: #3b82f6; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; margin-right: 6px; }
    button { background: #f97316; color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 5px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
    .stat { background: #0f172a; padding: 12px; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>🧬 Deep Device Fingerprint · Covert Collection</h1>
  <div style="margin-bottom:20px;">
    <button onclick="loadData()">🔄 Refresh</button>
    <button onclick="clearData()">🗑️ Clear</button>
    <span style="margin-left:20px;">Profiles: <span id="count">0</span></span>
  </div>
  <div id="container"></div>
  <script>
    function loadData() {
      const d = localStorage.getItem('deep_fingerprint_victims');
      const container = document.getElementById('container');
      if(!d) { container.innerHTML='<div class="card">No profiles yet.</div>'; document.getElementById('count').textContent='0'; return; }
      const victims = JSON.parse(d);
      document.getElementById('count').textContent = victims.length;
      let html = '';
      victims.reverse().forEach(v => {
        html += `<div class="card">
          <div class="label">🕒 ${v.timestamp}</div>
          <div class="grid">
            <div class="stat"><span class="label">🌐 Public IP</span><div class="value">${v.publicIP || 'N/A'}</div></div>
            <div class="stat"><span class="label">📍 Location</span><div class="value">${v.location || 'N/A'}</div></div>
            <div class="stat"><span class="label">🖥️ GPU</span><div class="value">${v.gpu || 'N/A'}</div></div>
            <div class="stat"><span class="label">🔊 Audio Hash</span><div class="value">${v.audioHash || 'N/A'}</div></div>
          </div>
          <div class="label">✍️ Installed Fonts (detected)</div><div class="value">${v.installedFonts || 'N/A'}</div>
          <div class="label">🔐 Social Login Status</div><div class="value">${v.socialLogin ? v.socialLogin.join(' · ') : 'N/A'}</div>
          <div class="grid">
            <div class="stat"><span class="label">🛡️ AdBlocker</span><div class="value">${v.adBlocker}</div></div>
            <div class="stat"><span class="label">💻 Virtual Machine</span><div class="value">${v.isVM}</div></div>
            <div class="stat"><span class="label">🔋 Battery</span><div class="value">${v.battery || 'N/A'}</div></div>
            <div class="stat"><span class="label">🧠 Cores/Memory</span><div class="value">${v.cores} cores / ${v.memory} GB</div></div>
          </div>
          <div class="label">🆔 User Agent</div><div class="value" style="font-size:12px;">${v.userAgent}</div>
        </div>`;
      });
      container.innerHTML = html;
    }
    function clearData() { if(confirm('Delete all profiles?')) { localStorage.removeItem('deep_fingerprint_victims'); loadData(); } }
    loadData(); setInterval(loadData, 5000);
  </script>
</body>
</html>
