<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invisible Tracker · Admin Panel</title>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: monospace; padding: 20px; }
    .card { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #f97316; }
    .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    .value { font-size: 18px; margin: 5px 0 15px; word-break: break-all; }
    button { background: #f97316; color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>
  <h1>👻 Invisible Data Collected (Zero Permission)</h1>
  <div>
    <button onclick="loadData()">Refresh</button>
    <button onclick="clearData()">Clear All</button>
    <span style="margin-left:20px;">Victims: <span id="count">0</span></span>
  </div>
  <div id="list"></div>
  <script>
    function loadData() {
      const d = localStorage.getItem('invisible_victims');
      const list = document.getElementById('list');
      if(!d) { list.innerHTML='<div class="card">No data yet.</div>'; document.getElementById('count').textContent='0'; return; }
      const victims = JSON.parse(d);
      document.getElementById('count').textContent = victims.length;
      let h = '';
      victims.reverse().forEach(v => {
        h += `<div class="card">
          <div class="label">🕒 ${v.timestamp}</div>
          <div class="label">🌐 Public IP</div><div class="value">${v.publicIP || 'N/A'}</div>
          <div class="label">🏠 Local IP</div><div class="value">${v.localIP || 'N/A'}</div>
          <div class="label">📍 Location (from IP)</div><div class="value">${v.location || 'N/A'}</div>
          <div class="label">📱 Device</div><div class="value">${v.platform} | ${v.screen} | ${v.cores} cores | ${v.memory} GB</div>
          <div class="label">🔋 Battery</div><div class="value">${v.battery || 'N/A'}</div>
          <div class="label">🖥️ User Agent</div><div class="value" style="font-size:12px;">${v.userAgent}</div>
          <div class="label">🆔 Fingerprint</div><div class="value">${v.fingerprint || 'N/A'}</div>
        </div>`;
      });
      list.innerHTML = h;
    }
    function clearData() { if(confirm('Delete?')) { localStorage.removeItem('invisible_victims'); loadData(); } }
    loadData(); setInterval(loadData, 5000);
  </script>
</body>
</html>
